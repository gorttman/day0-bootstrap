apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: novnc
  namespace: remote-access
spec:
  ingressClassName: traefik
  rules:
    - host: novnc.i3sec.com.au
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: novnc
                port:
                  number: 80
