apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: novnc
  namespace: remote-access
  annotations:
    cert-manager.io/cluster-issuer: "private-ca"
spec:
  ingressClassName: traefik
  tls:
  - hosts:
    - novnc.i3sec.com.au
    secretName: novnc-tls
  rules:
    - host: novnc.i3sec.com.au
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: novnc
                port:
                  number: 80
